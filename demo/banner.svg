<svg width="900" height="280" viewBox="0 0 900 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d0d1f"/>
      <stop offset="100%" stop-color="#071020"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="45%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="scanGrad" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#a78bfa" stop-opacity="0.7"/>
      <stop offset="60%"  stop-color="#22d3ee" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="divGrad" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#a78bfa" stop-opacity="0.5"/>
      <stop offset="70%"  stop-color="#22d3ee" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <filter id="titleGlow" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-5%" y="-40%" width="110%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    .scan {
      animation: scan 5s linear infinite;
    }
    @keyframes scan {
      0%   { transform: translateY(-4px); opacity: 0; }
      5%   { opacity: 1; }
      95%  { opacity: 1; }
      100% { transform: translateY(284px); opacity: 0; }
    }

    .title {
      animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) both;
    }
    .sub {
      animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.25s both;
    }
    .pills {
      animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.45s both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .dot-pulse {
      animation: dotPulse 3s ease-in-out infinite;
    }
    .dot-pulse-2 { animation: dotPulse 3s ease-in-out 0.6s infinite; }
    .dot-pulse-3 { animation: dotPulse 3s ease-in-out 1.2s infinite; }
    .dot-pulse-4 { animation: dotPulse 3s ease-in-out 1.8s infinite; }
    @keyframes dotPulse {
      0%,100% { opacity: 0.07; }
      50%     { opacity: 0.22; }
    }

    .corner-tl { animation: cornerFade 1s ease 0.1s both; }
    .corner-tr { animation: cornerFade 1s ease 0.2s both; }
    .corner-bl { animation: cornerFade 1s ease 0.3s both; }
    .corner-br { animation: cornerFade 1s ease 0.4s both; }
    @keyframes cornerFade {
      from { opacity: 0; } to { opacity: 0.7; }
    }

    .pill-enc  { animation: pillPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.6s both; }
    .pill-wal  { animation: pillPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.75s both; }
    .pill-zero { animation: pillPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.9s both; }
    .pill-ts   { animation: pillPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 1.05s both; }
    .pill-crc  { animation: pillPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 1.2s both; }
    @keyframes pillPop {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }

    .blink {
      animation: blink 1.1s step-end infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 1; } 50% { opacity: 0; }
    }
  </style>

  <!-- Background -->
  <rect width="900" height="280" rx="14" fill="url(#bg)"/>

  <!-- Grid dots - scattered pattern -->
  <g class="dot-pulse" filter="url(#dotGlow)">
    <circle cx="60"  cy="40"  r="1.5" fill="#a78bfa"/>
    <circle cx="140" cy="25"  r="1.5" fill="#818cf8"/>
    <circle cx="220" cy="50"  r="1.5" fill="#a78bfa"/>
    <circle cx="300" cy="30"  r="1.5" fill="#22d3ee"/>
    <circle cx="380" cy="20"  r="1.5" fill="#818cf8"/>
    <circle cx="520" cy="35"  r="1.5" fill="#a78bfa"/>
    <circle cx="620" cy="22"  r="1.5" fill="#22d3ee"/>
    <circle cx="730" cy="45"  r="1.5" fill="#818cf8"/>
    <circle cx="840" cy="28"  r="1.5" fill="#a78bfa"/>
  </g>
  <g class="dot-pulse-2" filter="url(#dotGlow)">
    <circle cx="80"  cy="240" r="1.5" fill="#22d3ee"/>
    <circle cx="180" cy="255" r="1.5" fill="#a78bfa"/>
    <circle cx="290" cy="245" r="1.5" fill="#818cf8"/>
    <circle cx="430" cy="260" r="1.5" fill="#22d3ee"/>
    <circle cx="560" cy="248" r="1.5" fill="#a78bfa"/>
    <circle cx="670" cy="258" r="1.5" fill="#818cf8"/>
    <circle cx="790" cy="242" r="1.5" fill="#22d3ee"/>
    <circle cx="860" cy="255" r="1.5" fill="#a78bfa"/>
  </g>
  <g class="dot-pulse-3" filter="url(#dotGlow)">
    <circle cx="30"  cy="130" r="1.5" fill="#818cf8"/>
    <circle cx="50"  cy="170" r="1.5" fill="#22d3ee"/>
    <circle cx="870" cy="120" r="1.5" fill="#a78bfa"/>
    <circle cx="855" cy="160" r="1.5" fill="#818cf8"/>
  </g>
  <g class="dot-pulse-4" filter="url(#dotGlow)">
    <circle cx="100" cy="80"  r="1"   fill="#a78bfa"/>
    <circle cx="200" cy="90"  r="1"   fill="#22d3ee"/>
    <circle cx="700" cy="75"  r="1"   fill="#818cf8"/>
    <circle cx="800" cy="85"  r="1"   fill="#22d3ee"/>
    <circle cx="100" cy="200" r="1"   fill="#22d3ee"/>
    <circle cx="800" cy="195" r="1"   fill="#a78bfa"/>
  </g>

  <!-- Corner bracket accents -->
  <path class="corner-tl" d="M28 20 L20 20 L20 28" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
  <path class="corner-tr" d="M872 20 L880 20 L880 28" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
  <path class="corner-bl" d="M28 260 L20 260 L20 252" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
  <path class="corner-br" d="M872 260 L880 260 L880 252" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>

  <!-- Scan line -->
  <rect class="scan" x="0" y="0" width="900" height="1.5" rx="1" fill="url(#scanGrad)"/>

  <!-- ── Main title ── -->
  <text class="title" x="450" y="134"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="90" font-weight="900"
    fill="url(#titleGrad)"
    filter="url(#titleGlow)"
    letter-spacing="-2">AgentDB</text>

  <!-- Cursor blink after title -->
  <rect class="title blink" x="760" y="88" width="5" height="52" rx="2" fill="#22d3ee" opacity="0.8"/>

  <!-- Divider line -->
  <rect class="sub" x="160" y="154" width="580" height="1" rx="0.5" fill="url(#divGrad)"/>

  <!-- Subtitle -->
  <text class="sub" x="450" y="177"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="13.5" fill="#94a3b8"
    letter-spacing="3.5">
    EMBEDDED DOCUMENT DATABASE FOR NODE.JS
  </text>

  <!-- ── Feature pills ── -->
  <!-- AES-256-GCM -->
  <g class="pill-enc" transform="translate(152, 205)">
    <rect width="118" height="28" rx="14" fill="#1e1040" stroke="#a78bfa" stroke-width="1"/>
    <circle cx="18" cy="14" r="5" fill="#a78bfa" opacity="0.25"/>
    <text x="18" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#a78bfa">🔒</text>
    <text x="68" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#a78bfa">AES-256-GCM</text>
  </g>

  <!-- WAL -->
  <g class="pill-wal" transform="translate(280, 205)">
    <rect width="82" height="28" rx="14" fill="#0c1f28" stroke="#22d3ee" stroke-width="1"/>
    <text x="41" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#22d3ee">✓ WAL safe</text>
  </g>

  <!-- Zero deps -->
  <g class="pill-zero" transform="translate(372, 205)">
    <rect width="90" height="28" rx="14" fill="#1a1000" stroke="#f97316" stroke-width="1"/>
    <text x="45" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#f97316">zero deps</text>
  </g>

  <!-- TypeScript -->
  <g class="pill-ts" transform="translate(472, 205)">
    <rect width="100" height="28" rx="14" fill="#0a1628" stroke="#3b82f6" stroke-width="1"/>
    <text x="50" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#60a5fa">TypeScript 5</text>
  </g>

  <!-- CRC32 -->
  <g class="pill-crc" transform="translate(582, 205)">
    <rect width="100" height="28" rx="14" fill="#0f1f0a" stroke="#22c55e" stroke-width="1"/>
    <text x="50" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#4ade80">CRC32 + zlib</text>
  </g>
</svg>
